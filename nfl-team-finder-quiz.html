<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d0d0d;
  --surface:#161616;
  --surface2:#1f1f1f;
  --border:#2a2a2a;
  --gold:#f5c842;
  --gold2:#e6a800;
  --white:#f5f0e8;
  --muted:#888;
  --red:#e63946;
  --green:#52b788;
  --radius:12px;
}

body{
  background:var(--bg);
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* BG TEXTURE */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(245,200,66,0.08) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.01) 40px, rgba(255,255,255,0.01) 41px),
    repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.01) 40px, rgba(255,255,255,0.01) 41px);
  pointer-events:none;
  z-index:0;
}

.wrap{max-width:780px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1;}

/* HEADER */
.quiz-header{text-align:center;padding:50px 0 40px;}
.quiz-header .tag{
  display:inline-block;
  font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);border:1px solid rgba(245,200,66,0.3);
  padding:5px 14px;border-radius:20px;margin-bottom:20px;
  background:rgba(245,200,66,0.05);
}
.quiz-header h1{
  font-family:'Alfa Slab One',serif;
  font-size:clamp(38px,8vw,72px);
  line-height:1;
  color:var(--white);
  letter-spacing:-1px;
}
.quiz-header h1 em{color:var(--gold);font-style:normal;}
.quiz-header p{
  margin-top:16px;font-size:17px;color:var(--muted);
  max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6;
}

/* PROGRESS */
.progress-wrap{margin-bottom:36px;}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.progress-label{font-size:13px;color:var(--muted);font-weight:500;}
.progress-num{font-family:'Alfa Slab One',serif;font-size:20px;color:var(--gold);}
.progress-bar{
  height:4px;background:var(--surface2);border-radius:4px;overflow:hidden;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));
  border-radius:4px;transition:width 0.5s cubic-bezier(.4,0,.2,1);
}

/* QUESTION CARD */
.q-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:36px;
  animation:slideIn 0.35s cubic-bezier(.4,0,.2,1);
}
@keyframes slideIn{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:translateY(0);}
}

.q-emoji{font-size:40px;margin-bottom:16px;display:block;}
.q-text{
  font-family:'Alfa Slab One',serif;
  font-size:clamp(20px,4vw,28px);
  line-height:1.25;
  margin-bottom:8px;
  color:var(--white);
}
.q-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.5;}

/* OPTIONS GRID */
.options{display:grid;gap:12px;}
.options.cols-2{grid-template-columns:1fr 1fr;}
.options.cols-3{grid-template-columns:1fr 1fr 1fr;}

.opt{
  background:var(--surface2);
  border:2px solid var(--border);
  border-radius:var(--radius);
  padding:16px 18px;
  cursor:pointer;
  transition:all 0.18s;
  text-align:left;
  display:flex;align-items:center;gap:12px;
  font-family:'DM Sans',sans-serif;
  color:var(--white);
  font-size:15px;font-weight:500;
  line-height:1.3;
  position:relative;
  overflow:hidden;
}
.opt::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(245,200,66,0.06),transparent);
  opacity:0;transition:opacity 0.18s;
}
.opt:hover{border-color:rgba(245,200,66,0.5);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,0.4);}
.opt:hover::before{opacity:1;}
.opt.selected{
  border-color:var(--gold);
  background:rgba(245,200,66,0.08);
  box-shadow:0 0 0 1px var(--gold), 0 6px 24px rgba(245,200,66,0.1);
}
.opt.selected::before{opacity:1;}
.opt-icon{font-size:26px;flex-shrink:0;}
.opt-text{}
.opt-text strong{display:block;font-size:15px;}
.opt-text span{font-size:13px;color:var(--muted);font-weight:400;}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:12px;}
.btn{
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px;
  padding:13px 28px;border-radius:var(--radius);border:none;cursor:pointer;
  transition:all 0.18s;letter-spacing:0.3px;
}
.btn-back{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.btn-back:hover{color:var(--white);border-color:var(--muted);}
.btn-next{
  background:var(--gold);color:#0d0d0d;margin-left:auto;
  box-shadow:0 4px 20px rgba(245,200,66,0.25);
}
.btn-next:hover{background:var(--gold2);transform:translateY(-1px);box-shadow:0 6px 28px rgba(245,200,66,0.35);}
.btn-next:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;}

/* COUNTRY SELECT */
.country-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;
}
.country-opt{
  background:var(--surface2);border:2px solid var(--border);border-radius:10px;
  padding:12px 10px;cursor:pointer;text-align:center;transition:all 0.18s;
  font-size:13px;font-weight:500;color:var(--white);
}
.country-opt:hover{border-color:rgba(245,200,66,0.4);transform:translateY(-2px);}
.country-opt.selected{border-color:var(--gold);background:rgba(245,200,66,0.08);}
.country-flag{font-size:24px;display:block;margin-bottom:6px;}

/* RESULT */
.result-wrap{animation:slideIn 0.5s cubic-bezier(.4,0,.2,1);}
.result-podium{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  margin-bottom:24px;
}
.result-banner{
  padding:40px 36px 32px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.result-banner::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, var(--team-color1,rgba(245,200,66,0.2)) 0%, transparent 70%);
}
.result-rank{
  font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);margin-bottom:14px;position:relative;
}
.result-team-name{
  font-family:'Alfa Slab One',serif;
  font-size:clamp(32px,7vw,56px);
  line-height:1;color:var(--white);
  position:relative;margin-bottom:6px;
}
.result-team-nick{
  font-size:15px;color:var(--muted);position:relative;margin-bottom:20px;
}
.result-colors{display:flex;gap:8px;justify-content:center;position:relative;margin-bottom:16px;}
.color-swatch{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);}
.result-emoji{font-size:48px;display:block;position:relative;}

.result-details{padding:0 36px 36px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.detail-card{
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:16px;
}
.detail-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.detail-val{font-size:14px;color:var(--white);line-height:1.5;}
.detail-val strong{color:var(--gold);}

.runner-up-section{margin-top:6px;}
.runner-up-label{font-size:13px;color:var(--muted);margin-bottom:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.runner-up-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ru-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;display:flex;gap:12px;align-items:center;cursor:pointer;
  transition:all 0.18s;
}
.ru-card:hover{border-color:rgba(245,200,66,0.4);transform:translateY(-2px);}
.ru-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.ru-name{font-weight:700;font-size:14px;color:var(--white);}
.ru-sub{font-size:12px;color:var(--muted);}

.restart-btn{
  display:block;width:100%;text-align:center;
  background:transparent;color:var(--muted);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;
  margin-top:16px;transition:all 0.18s;
}
.restart-btn:hover{color:var(--white);border-color:var(--muted);}

.gmp-badge{

  background:rgba(82,183,136,0.1);border:1px solid rgba(82,183,136,0.3);
  color:var(--green);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:5px 12px;border-radius:20px;margin-top:8px;

.score-bar-wrap{margin-top:4px;}
.score-bar{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px;}
.score-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:3px;}

@media(max-width:560px){
  .q-card{padding:24px 18px;}
  .options.cols-2,.options.cols-3{grid-template-columns:1fr;}
  .result-details{grid-template-columns:1fr;}
  .runner-up-cards{grid-template-columns:1fr;}
  .country-grid{grid-template-columns:repeat(3,1fr);}
  .result-banner{padding:28px 20px 24px;}
  .result-details{padding:0 20px 24px;}
}
</style>
</head>

// ─── SCORING ENGINE ───────────────────────────────────────────────────────────
function scoreTeams(answers) {
  const scores = {};
  Object.keys(TEAMS).forEach(t => scores[t] = 0);

  Object.entries(TEAMS).forEach(([name, t]) => {

    // Country / GMP boost
    if (answers.country && answers.country !== "other") {
      if (t.gmp.includes(answers.country)) scores[name] += 30;
    }

    // Colors
    if (answers.colors) {
      const picked = answers.colors.split(",");
      const matches = picked.filter(c => t.colorTags.includes(c)).length;
      scores[name] += matches * 15;
    }

    // Weather
    if (answers.weather && t.weather === answers.weather) scores[name] += 10;

    // Mascot
    if (answers.mascot && t.mascotType === answers.mascot) scores[name] += 12;

    // Size
    if (answers.size) {
      if (answers.size === "big" && t.size === "big") scores[name] += 10;
      if (answers.size === "mid" && (t.size === "mid" || t.size === "big")) scores[name] += 8;
      if (answers.size === "small" && t.building) scores[name] += 10;
    }

    // Vibe
    if (answers.vibe) {
      const vibeMap = {
        dynasty: ["dynasty"],
        underdog: ["underdog","passionate"],
        gritty: ["gritty","loyal"],
        fun: ["fun","flashy","cool","wild"],
        building: ["building","rising","hopeful"],
        tradition: ["tradition","class","history"],
      };
      const matching = vibeMap[answers.vibe] || [];
      if (matching.some(v => t.vibe.includes(v))) scores[name] += 12;
    }

    // Soccer equivalent
    if (answers.soccer) {
      const soccerMap = {
        big_euro: ["big"],
        passionate: ["mid"],
        defensive: ["mid"],
        stylish: ["mid","big"],
        underdog_soccer: ["small","mid"],
        none: [],
      };
      const allowed = soccerMap[answers.soccer] || [];
      if (allowed.includes(t.size)) scores[name] += 8;
    }

    // Atmosphere
    if (answers.atmosphere) {
      const atmMap = {
        loud: ["passionate","loud","gritty"],
        fun: ["fun","flashy","culture","wild"],
        intense: ["gritty","intense","loyal"],
        tradition: ["tradition","class","dynasty","history"],
      };
      const matching = atmMap[answers.atmosphere] || [];
      if (matching.some(v => t.vibe.includes(v))) scores[name] += 10;
    }

    // Journey
    if (answers.journey) {
      if (answers.journey === "winner" && !t.building && !t.underdog) scores[name] += 15;
      if (answers.journey === "grower" && t.building) scores[name] += 18;
      if (answers.journey === "suffered" && t.underdog) scores[name] += 18;
      if (answers.journey === "local" && answers.country && t.gmp.includes(answers.country)) scores[name] += 25;
    }
  });

  return Object.entries(scores).sort((a,b) => b[1]-a[1]);
}

// ─── APP STATE ────────────────────────────────────────────────────────────────
let currentQ = 0;
const answers = {};

function render() {
  const area = document.getElementById("quizArea");
  const header = document.getElementById("quizHeader");

  if (currentQ >= QUESTIONS.length) {
    header.style.display = "none";
    renderResult(area);
    return;
  }

  header.style.display = "";
  const q = QUESTIONS[currentQ];
  const pct = Math.round((currentQ / QUESTIONS.length) * 100);

  let optionsHTML = "";
  if (q.type === "country") {
    optionsHTML = `<div class="country-grid" id="optContainer">` +
      COUNTRIES.map(c =>
        `<div class="country-opt${answers.country===c.val?' selected':''}" data-val="${c.val}" onclick="selectCountry('${c.val}')">
          <span class="country-flag">${c.flag}</span>${c.name}
        </div>`
      ).join("") + `</div>`;
  } else {
    const colClass = `cols-${q.cols||2}`;
    optionsHTML = `<div class="options ${colClass}" id="optContainer">` +
      q.options.map(o =>
        `<div class="opt${answers[q.id]===o.val?' selected':''}" data-val="${o.val}" onclick="selectOpt('${q.id}','${o.val}',this)">
          <span class="opt-icon">${o.icon}</span>
          <span class="opt-text"><strong>${o.label}</strong>${o.sub?`<span>${o.sub}</span>`:""}</span>
        </div>`
      ).join("") + `</div>`;
  }

  const hasAnswer = answers[q.id] !== undefined;

  area.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="progress-label">Question ${currentQ+1} of ${QUESTIONS.length}</span>
        <span class="progress-num">${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card">
      <span class="q-emoji">${q.emoji}</span>
      <div class="q-text">${q.text}</div>
      <div class="q-sub">${q.sub}</div>
      ${optionsHTML}
      <div class="nav">
        ${currentQ>0?`<button class="btn btn-back" onclick="goBack()">← Back</button>`:`<div></div>`}
        <button class="btn btn-next" id="nextBtn" ${hasAnswer?"":"disabled"} onclick="goNext()">
          ${currentQ===QUESTIONS.length-1?"See My Team 🏈":"Next →"}
        </button>
      </div>
    </div>`;
}

function selectCountry(val) {
  answers.country = val;
  document.querySelectorAll(".country-opt").forEach(el => {
    el.classList.toggle("selected", el.dataset.val === val);
  });
  document.getElementById("nextBtn").disabled = false;
}

function selectOpt(id, val, el) {
  answers[id] = val;
  document.querySelectorAll("#optContainer .opt").forEach(o => o.classList.remove("selected"));
  el.classList.add("selected");
  document.getElementById("nextBtn").disabled = false;
}

function goNext() {
  if (answers[QUESTIONS[currentQ].id] === undefined && QUESTIONS[currentQ].type !== "country") return;
  currentQ++;
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function goBack() {
  if (currentQ > 0) { currentQ--; render(); window.scrollTo({top:0,behavior:"smooth"}); }
}

function renderResult(area) {
  const ranked = scoreTeams(answers);
  const [topName, topScore] = ranked[0];
  const topTeam = TEAMS[topName];
  const maxScore = topScore;

  const runnerUps = ranked.slice(1,5);
  const countryName = COUNTRIES.find(c=>c.val===answers.country);
  const hasGMP = topTeam.gmp.includes(answers.country);

  const c1 = topTeam.colors[0], c2 = topTeam.colors[1]||"#333";

  const ruCards = runnerUps.map(([n,s]) => {
    const t = TEAMS[n];
    return `<div class="ru-card">
      <div class="ru-dot" style="background:${t.colors[0]}"></div>
      <div><div class="ru-name">${n}</div><div class="ru-sub">${t.conf} · ${t.city}</div></div>
    </div>`;
  }).join("");

  area.innerHTML = `<div class="result-wrap">
    <div class="result-podium">
      <div class="result-banner" style="--team-color1:${c1}33">
        <div class="result-rank">🏈 Your NFL Team Match</div>
        <div class="result-colors">
          <div class="color-swatch" style="background:${c1}"></div>
          <div class="color-swatch" style="background:${c2}"></div>
        </div>
        <div class="result-team-name">${topName}</div>
        <div class="result-team-nick">${topTeam.city} · ${topTeam.conf} ${topTeam.div}</div>
        <span class="result-emoji">${topTeam.emoji}</span>
        ${hasGMP?`<div style="margin-top:14px"><span class="gmp-badge">✅ Official NFL team in ${countryName?countryName.name:answers.country}</span></div>`:""}
      </div>
      <div class="result-details">
        <div class="detail-card" style="grid-column:1/-1">
          <div class="detail-label">Why you match</div>
          <div class="detail-val">${topTeam.style}</div>
        </div>
        <div class="detail-card">
          <div class="detail-label">Soccer equivalent</div>
          <div class="detail-val"><strong>${topTeam.soccerEq}</strong><br><span style="color:var(--muted);font-size:12px">${topTeam.soccerLeague}</span></div>
        </div>
        <div class="detail-card">
          <div class="detail-label">Conference</div>
          <div class="detail-val"><strong>${topTeam.conf} ${topTeam.div}</strong><br><span style="color:var(--muted);font-size:12px">${topTeam.weather==="cold"?"Cold weather 🥶":topTeam.weather==="hot"?"Warm weather ☀️":"Mild weather 🌤️"}</span></div>
        </div>
        ${topTeam.gmp.length?`
        <div class="detail-card" style="grid-column:1/-1">
          <div class="detail-label">Global Markets Program</div>
          <div class="detail-val">Official NFL presence in: <strong>${topTeam.gmp.join(", ")}</strong></div>
          <div class="score-bar-wrap">
            <div class="score-bar"><div class="score-fill" style="width:${Math.round((topScore/maxScore)*100)}%"></div></div>
          </div>
        </div>`:""}
      </div>
    </div>

    <div class="runner-up-section">
      <div class="runner-up-label">Also consider…</div>
      <div class="runner-up-cards">${ruCards}</div>
    </div>

    <button class="restart-btn" onclick="restartQuiz()">🔄 Retake the quiz</button>
  </div>`;
}

function restartQuiz() {
  currentQ = 0;
  Object.keys(answers).forEach(k => delete answers[k]);
  document.getElementById("quizHeader").style.display = "";
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

// Start
render();
</script>
